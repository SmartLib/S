<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المكتبة الرقمية - طلبة الاقتصاد الرقمي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --primary-dark: #0f172a;
    --accent-yellow: #eab308;
    --bg-color: #f8fafc;
    --card-bg: #ffffff;
    --text-main: #334155;
    --text-muted: #64748b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Cairo', sans-serif;
    background-color: var(--bg-color);
  }

  /* ═══ HERO HEADER ═══ */
  .site-hero {
    background: var(--primary-dark);
    padding: 44px 20px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .site-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 15% 20%, rgba(234,179,8,0.12) 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(234,179,8,0.08) 0%, transparent 45%);
  }
  .hero-canvas {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .site-hero-inner {
    position: relative;
    z-index: 1;
    opacity: 0;
    animation: heroIn 0.9s ease-out forwards;
  }
  @keyframes heroIn {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .site-logo {
    width: 64px; height: 64px;
    background: var(--accent-yellow);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    font-size: 30px;
    color: var(--primary-dark);
    box-shadow: 0 10px 25px rgba(234,179,8,0.35);
  }
  .site-title {
    color: #ffffff;
    font-size: 28px;
    font-weight: 900;
    margin: 0 0 6px;
  }
  .site-subtitle {
    color: #cbd5e1;
    font-size: 14px;
    font-weight: 600;
    margin: 0;
  }

  /* ═══ NAV ═══ */
  .menu-toggle {
    position: fixed;
    top: 16px; left: 16px;
    width: 40px; height: 40px;
    background: var(--accent-yellow);
    border: none;
    border-radius: 11px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    z-index: 300;
    box-shadow: 0 6px 14px rgba(234,179,8,0.35);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.4s ease;
    animation: menuPulse 2.2s ease-in-out 1.2s 2;
  }
  .menu-toggle:hover { transform: scale(1.08); }
  .menu-toggle span {
    width: 16px; height: 2px;
    background: var(--primary-dark);
    border-radius: 2px;
    transition: transform 0.4s cubic-bezier(0.65,0,0.35,1), opacity 0.3s ease;
  }
  .menu-toggle.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
  .menu-toggle.open span:nth-child(2) { opacity: 0; }
  .menu-toggle.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
  @keyframes menuPulse {
    0%, 100% { box-shadow: 0 8px 20px rgba(234,179,8,0.35); }
    50% { box-shadow: 0 8px 26px rgba(234,179,8,0.65), 0 0 0 8px rgba(234,179,8,0.12); }
  }

  .menu-overlay {
    position: fixed; inset: 0;
    background: rgba(15,23,42,0.4);
    backdrop-filter: blur(2px);
    opacity: 0; visibility: hidden;
    transition: opacity 0.4s ease, visibility 0.4s ease;
    z-index: 250;
  }
  .menu-overlay.open { opacity: 1; visibility: visible; }

  .menu-panel {
    position: fixed;
    top: 64px; left: 16px;
    width: 220px;
    background: var(--card-bg);
    border-radius: 16px;
    box-shadow: 0 25px 50px rgba(15,23,42,0.25);
    padding: 8px;
    z-index: 280;
    transform-origin: top left;
    transform: scale(0.85) translateY(-14px);
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.35s ease, visibility 0.4s;
  }
  .menu-panel.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }
  .menu-panel-title {
    font-size: 10px;
    font-weight: 800;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 10px 8px;
  }
  .menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: transparent;
    border: none;
    padding: 10px 10px;
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-main);
    cursor: pointer;
    text-align: right;
    transition: background-color 0.3s ease, color 0.3s ease, transform 0.3s ease;
    opacity: 0;
    transform: translateX(-10px);
  }
  .menu-panel.open .menu-item {
    animation: itemIn 0.4s ease forwards;
  }
  .menu-panel.open .menu-item:nth-child(2) { animation-delay: 0.05s; }
  .menu-panel.open .menu-item:nth-child(3) { animation-delay: 0.1s; }
  .menu-panel.open .menu-item:nth-child(4) { animation-delay: 0.15s; }
  .menu-panel.open .menu-item:nth-child(5) { animation-delay: 0.2s; }
  .menu-panel.open .menu-item:nth-child(6) { animation-delay: 0.25s; }
  @keyframes itemIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .menu-item i { width: 18px; text-align: center; color: var(--text-muted); transition: color 0.3s ease; }
  .menu-item:hover { background: #f1f5f9; }
  .menu-item.active { background: var(--primary-dark); color: #fff; }
  .menu-item.active i { color: var(--accent-yellow); }

  .lang-toggle-btn {
    position: fixed;
    top: 16px; right: 16px;
    z-index: 300;
    width: 40px; height: 34px;
    border-radius: 20px;
    background: rgba(255,255,255,0.95);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--primary-dark);
    font-size: 12px;
    font-weight: 800;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    transition: transform 0.3s ease, background-color 0.4s ease, color 0.4s ease;
  }
  .lang-toggle-btn:hover { transform: scale(1.08); }
  html.theme-dark .lang-toggle-btn { background: #1e293b; color: var(--accent-yellow); }

  .theme-toggle {
    position: fixed;
    top: 16px; right: 64px;
    z-index: 300;
    width: 34px; height: 34px;
    border-radius: 50%;
    background: rgba(255,255,255,0.95);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--primary-dark);
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    transition: transform 0.4s ease, background-color 0.4s ease, color 0.4s ease;
  }
  .theme-toggle:hover { transform: scale(1.1) rotate(-12deg); }
  html.theme-dark .theme-toggle { background: #1e293b; color: var(--accent-yellow); }


  /* ═══ COMMAND PALETTE ═══ */
  .cmdk-trigger {
    position: fixed;
    bottom: 22px; left: 20px;
    width: 46px; height: 46px;
    background: var(--primary-dark);
    color: var(--accent-yellow);
    border: none;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    cursor: pointer;
    z-index: 300;
    box-shadow: 0 8px 20px rgba(15,23,42,0.3);
    transition: transform 0.3s ease;
  }
  .cmdk-trigger:hover { transform: scale(1.08); }

  .cmdk-overlay {
    position: fixed; inset: 0;
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(3px);
    z-index: 400;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 12vh;
    opacity: 0; visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease;
  }
  .cmdk-overlay.open { opacity: 1; visibility: visible; }

  .cmdk-box {
    width: 92%;
    max-width: 480px;
    background: var(--card-bg);
    border-radius: 16px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.35);
    overflow: hidden;
    transform: translateY(-18px) scale(0.97);
    opacity: 0;
    transition: transform 0.35s cubic-bezier(0.22,1,0.36,1), opacity 0.3s ease;
  }
  .cmdk-overlay.open .cmdk-box { transform: translateY(0) scale(1); opacity: 1; }

  .cmdk-input-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 18px;
    border-bottom: 1px solid #eef0f2;
  }
  .cmdk-input-row i { color: var(--text-muted); font-size: 15px; }
  .cmdk-input-row input {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    color: var(--text-main);
    background: transparent;
  }
  .cmdk-input-row kbd {
    background: #f1f5f9;
    color: var(--text-muted);
    font-size: 11px;
    padding: 3px 7px;
    border-radius: 5px;
    font-family: 'Cairo', sans-serif;
  }

  .cmdk-results { max-height: 320px; overflow-y: auto; padding: 8px; }
  .cmdk-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 12px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-main);
    transition: background-color 0.2s ease;
  }
  .cmdk-item i { width: 18px; text-align: center; color: var(--accent-yellow); }
  .cmdk-item:hover, .cmdk-item.hi { background: #f1f5f9; }
  .cmdk-empty { padding: 24px; text-align: center; color: var(--text-muted); font-size: 13px; }

  /* ═══ CURRENT SECTION INDICATOR ═══ */
  .current-indicator {
    max-width: 1100px;
    margin: 18px auto 6px;
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 700;
  }
  .current-indicator i { color: var(--accent-yellow); }
  .current-indicator span {
    color: var(--primary-dark);
    animation: fadeSwap 0.4s ease;
  }
  @keyframes fadeSwap {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ═══ SECTIONS ═══ */
  .section-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0;
    min-height: 300px;
  }
  .section {
    display: none;
  }
  .section.active {
    display: block;
    animation: sectionIn 0.55s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes sectionIn {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .section iframe {
    width: 100%;
    border: none;
    display: block;
    background: transparent;
  }

  .section-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 80px 20px;
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 600;
  }
  .spinner {
    width: 22px; height: 22px;
    border: 3px solid #e2e8f0;
    border-top-color: var(--accent-yellow);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ═══ FOOTER ═══ */
  .footer-container {
    background-color: var(--primary-dark);
    color: #ffffff;
    padding: 24px 20px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-top: 20px;
  }
  .footer-title {
    color: var(--accent-yellow);
    font-size: 18px;
    font-weight: 700;
  }
  .footer-subtitle {
    color: #ffffff;
    font-size: 12px;
    opacity: 0.9;
  }
  .footer-link-item {
    color: #ffffff;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    transition: color 0.3s ease;
  }
  .footer-link-item:hover { color: var(--accent-yellow); }
  .footer-divider {
    border: 0;
    border-top: 1px solid rgba(255,255,255,0.15);
    width: 80%;
    margin: 4px 0;
  }
  .footer-copy {
    color: #ffffff;
    font-size: 11px;
    opacity: 0.7;
  }

  /* ═══ 480px ═══ */
  @media (max-width: 480px) {
    .site-hero { padding: 30px 16px 26px; }
    .site-logo { width: 52px; height: 52px; font-size: 24px; border-radius: 13px; }
    .site-title { font-size: 20px; }
    .site-subtitle { font-size: 12px; }
    .menu-toggle { width: 36px; height: 36px; top: 12px; left: 12px; border-radius: 10px; }
    .menu-panel { top: 56px; left: 12px; width: calc(100% - 24px); max-width: 220px; }
    .theme-toggle { width: 30px; height: 30px; top: 12px; right: 58px; font-size: 12px; }
    .lang-toggle-btn { width: 36px; height: 30px; top: 12px; right: 12px; font-size: 11px; }
    .current-indicator { font-size: 12px; margin: 14px auto 4px; }
    .footer-container { padding: 18px 14px; gap: 6px; }
    .footer-title { font-size: 15px; }
  }

  /* ═══ 768px ═══ */
  @media (min-width: 481px) and (max-width: 768px) {
    .site-hero { padding: 36px 18px 30px; }
    .site-title { font-size: 24px; }
  }

  /* ═══ DARK MODE ═══ */
  html.theme-dark body { background-color: #0b1220; }
  html.theme-dark .menu-panel { background: #141b2d; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
  html.theme-dark .menu-panel-title { color: #64748b; }
  html.theme-dark .menu-item { color: #cbd5e1; }
  html.theme-dark .menu-item:hover { background: #1e293b; }
  html.theme-dark .menu-item.active { background: var(--accent-yellow); color: #0b1220; }
  html.theme-dark .menu-item.active i { color: #0b1220; }
  html.theme-dark .current-indicator { color: #64748b; }
  html.theme-dark .current-indicator span { color: #e2e8f0; }
  html.theme-dark .cmdk-box { background: #141b2d; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
  html.theme-dark .cmdk-input-row { border-color: #1f2937; }
  html.theme-dark .cmdk-input-row input { color: #e2e8f0; }
  html.theme-dark .cmdk-input-row i, html.theme-dark .cmdk-input-row kbd { color: #64748b; background: #1e293b; }
  html.theme-dark .cmdk-item { color: #cbd5e1; }
  html.theme-dark .cmdk-item:hover, html.theme-dark .cmdk-item.hi { background: #1e293b; }
  html.theme-dark .section-loading { color: #64748b; }
</style>
</head>

<script>
/* ---- helper: base64(UTF-8) -> string ---- */
function b64ToUtf8(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);

function autoSizeIframe(iframe) {
  try {
    const doc = iframe.contentDocument;
    if (!doc) return;
    function resize() {
      const h = Math.max(
        doc.documentElement ? doc.documentElement.scrollHeight : 0,
        doc.body ? doc.body.scrollHeight : 0
      );
      if (h > 0) iframe.style.height = h + 'px';
    }
    resize();
    setTimeout(resize, 200);
    setTimeout(resize, 700);
    if (window.ResizeObserver && doc.body) {
      const ro = new ResizeObserver(resize);
      ro.observe(doc.body);
    }
    doc.addEventListener('click', function () { setTimeout(resize, 150); setTimeout(resize, 400); });
    doc.addEventListener('input', function () { setTimeout(resize, 150); });
  } catch (e) { /* silent */ }
}

sections.forEach(function (s) {
  const iframe = document.getElementById(s.iframeId);
  const loadingEl = document.querySelector('#sec-' + s.key + ' [data-loading]');
  iframe.addEventListener('load', function () {
    autoSizeIframe(iframe);
    applyThemeToIframe(iframe);
    if (loadingEl) loadingEl.style.display = 'none';
    iframe.style.opacity = '1';
  });
  iframe.style.opacity = '0';
  iframe.style.transition = 'opacity 0.4s ease';
  iframe.srcdoc = b64ToUtf8(s.b64);
});

/* ---- dark mode ---- */
let isDark = false;
const themeToggle = document.getElementById('themeToggle');

function applyThemeToIframe(iframe) {
  try {
    if (iframe.contentDocument && iframe.contentDocument.documentElement) {
      iframe.contentDocument.documentElement.classList.toggle('theme-dark', isDark);
    }
  } catch (e) { /* silent */ }
}

function applyTheme(dark) {
  isDark = dark;
  document.documentElement.classList.toggle('theme-dark', dark);
  themeToggle.innerHTML = dark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
  sections.forEach(function (s) {
    applyThemeToIframe(document.getElementById(s.iframeId));
  });
}

themeToggle.addEventListener('click', function () { applyTheme(!isDark); });

const menuToggle = document.getElementById('menuToggle');
const menuPanel = document.getElementById('menuPanel');
const menuOverlay = document.getElementById('menuOverlay');

function openMenu() {
  menuToggle.classList.add('open');
  menuPanel.classList.add('open');
  menuOverlay.classList.add('open');
}
function closeMenu() {
  menuToggle.classList.remove('open');
  menuPanel.classList.remove('open');
  menuOverlay.classList.remove('open');
}
menuToggle.addEventListener('click', function () {

});

/* ---- section switching (shared) ---- */
const menuItems = document.querySelectorAll('.menu-item');
const allSections = document.querySelectorAll('.section');
const currentSectionLabel = document.getElementById('currentSectionLabel');

function goToSection(target) {
  menuItems.forEach(function (t) {
    t.classList.toggle('active', t.getAttribute('data-section') === target);
  });

  let matchedLabel = null;
  allSections.forEach(function (sec) {
    if (sec.id === 'sec-' + target) {
      sec.classList.add('active');
      const ifr = sec.querySelector('iframe');
      if (ifr) setTimeout(function(){ autoSizeIframe(ifr); }, 50);
    } else {
      sec.classList.remove('active');
    }
  });

  menuItems.forEach(function (item) {
    if (item.getAttribute('data-section') === target) matchedLabel = item.querySelector('span');
  });
  if (matchedLabel) {
    currentSectionLabel.setAttribute('data-ar', matchedLabel.getAttribute('data-ar'));
    currentSectionLabel.setAttribute('data-en', matchedLabel.getAttribute('data-en'));
    currentSectionLabel.textContent = matchedLabel.getAttribute('data-' + currentLang);
    currentSectionLabel.style.animation = 'none';
    void currentSectionLabel.offsetWidth;
    currentSectionLabel.style.animation = 'fadeSwap 0.4s ease';
  }

  closeMenu();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

menuItems.forEach(function (item) {
  item.addEventListener('click', function () {
    goToSection(item.getAttribute('data-section'));
  });
});

let currentLang = 'ar';
const langToggle = document.getElementById('langToggle');

function applyLang(lang) {
  currentLang = lang;
  langToggle.setAttribute('data-lang', lang);
  langToggle.textContent = lang === 'ar' ? 'EN' : 'AR';
  document.querySelectorAll('[data-ar][data-en]').forEach(function (el) {
    el.textContent = el.getAttribute('data-' + lang);
  });
  const cmdkInputEl = document.getElementById('cmdkInput');
  if (cmdkInputEl) cmdkInputEl.placeholder = cmdkInputEl.getAttribute('data-' + lang + '-ph');
  document.documentElement.setAttribute('lang', lang);
}

langToggle.addEventListener('click', function () {
  applyLang(currentLang === 'ar' ? 'en' : 'ar');
});

/* ---- command palette ---- */
const cmdkTrigger = document.getElementById('cmdkTrigger');
const cmdkOverlay = document.getElementById('cmdkOverlay');
const cmdkInput = document.getElementById('cmdkInput');
const cmdkResults = document.getElementById('cmdkResults');

const cmdkData = [
  { key: 'home', icon: 'fa-house', ar: 'الصفحة الرئيسية', en: 'Home' },
  { key: 'tools', icon: 'fa-toolbox', ar: 'الأدوات', en: 'Tools' },
  { key: 'books', icon: 'fa-book', ar: 'الكتب الرقمية', en: 'Digital Books' },
  { key: 'glossary', icon: 'fa-spell-check', ar: 'المصطلحات', en: 'Glossary' },
  { key: 'about', icon: 'fa-circle-info', ar: 'عن المكتبة', en: 'About' }
];

let cmdkHighlight = 0;

function renderCmdkResults(query) {
  const q = (query || '').trim().toLowerCase();
  const filtered = cmdkData.filter(function (item) {
    return item.ar.toLowerCase().indexOf(q) !== -1 || item.en.toLowerCase().indexOf(q) !== -1;
  });
  cmdkResults.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'cmdk-empty';
    empty.textContent = currentLang === 'ar' ? 'ما فيه نتائج مطابقة' : 'No matching results';
    cmdkResults.appendChild(empty);
    return;
  }
  cmdkHighlight = 0;
  filtered.forEach(function (item, idx) {
    const row = document.createElement('div');
    row.className = 'cmdk-item' + (idx === 0 ? ' hi' : '');
    row.innerHTML = '<i class="fas ' + item.icon + '"></i><span>' + (currentLang === 'ar' ? item.ar : item.en) + '</span>';
    row.addEventListener('click', function () {
      goToSection(item.key);
      closeCmdk();
    });
    row.addEventListener('mouseenter', function () {
      cmdkResults.querySelectorAll('.cmdk-item').forEach(function (r) { r.classList.remove('hi'); });
      row.classList.add('hi');
      cmdkHighlight = idx;
    });
    cmdkResults.appendChild(row);
  });
}

function openCmdk() {
  cmdkOverlay.classList.add('open');
  cmdkInput.value = '';
  renderCmdkResults('');
  setTimeout(function () { cmdkInput.focus(); }, 60);
}
function closeCmdk() {
  cmdkOverlay.classList.remove('open');
}

cmdkTrigger.addEventListener('click', openCmdk);
cmdkOverlay.addEventListener('click', function (e) { if (e.target === cmdkOverlay) closeCmdk(); });
cmdkInput.addEventListener('input', function () { renderCmdkResults(cmdkInput.value); });

document.addEventListener('keydown', function (e) {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
    e.preventDefault();
    if (cmdkOverlay.classList.contains('open')) closeCmdk(); else openCmdk();
  }
  if (e.key === 'Escape') closeCmdk();
  if (cmdkOverlay.classList.contains('open')) {
    const items = Array.from(cmdkResults.querySelectorAll('.cmdk-item'));
    if (e.key === 'ArrowDown' && items.length) {
      e.preventDefault();
      cmdkHighlight = Math.min(cmdkHighlight + 1, items.length - 1);
      items.forEach(function (r) { r.classList.remove('hi'); });
      items[cmdkHighlight].classList.add('hi');
      items[cmdkHighlight].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'ArrowUp' && items.length) {
      e.preventDefault();
      cmdkHighlight = Math.max(cmdkHighlight - 1, 0);
      items.forEach(function (r) { r.classList.remove('hi'); });
      items[cmdkHighlight].classList.add('hi');
      items[cmdkHighlight].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'Enter' && items.length) {
      e.preventDefault();
      items[cmdkHighlight].click();
    }
  }
});

/* ---- hero network canvas ---- */
(function () {
  const canvas = document.getElementById('heroCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let w, h, particles;

  function resize() {
    const hero = canvas.parentElement;
    w = canvas.width = hero.offsetWidth;
    h = canvas.height = hero.offsetHeight;
  }
  function initParticles() {
    const count = Math.max(18, Math.min(42, Math.floor(w / 26)));
    particles = Array.from({ length: count }, function () {
      return {
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.26,
        vy: (Math.random() - 0.5) * 0.26
      };
    });
  }
  function step() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(function (p) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > w) p.vx *= -1;
      if (p.y < 0 || p.y > h) p.vy *= -1;
    });
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const a = particles[i], b = particles[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 130) {
          ctx.strokeStyle = 'rgba(234,179,8,' + (0.16 * (1 - dist / 130)) + ')';
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
        }
      }
      ctx.fillStyle = 'rgba(234,179,8,0.45)';
      ctx.beginPath(); ctx.arc(particles[i].x, particles[i].y, 1.5, 0, Math.PI * 2); ctx.fill();
    }
    requestAnimationFrame(step);
  }

  resize();
  initParticles();
  window.addEventListener('resize', function () { resize(); initParticles(); });
  step();
})();
</script>

</body>
</html>
