<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المكتبة الرقمية - طلبة الاقتصاد الرقمي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --primary-dark: #0f172a;
    --accent-yellow: #eab308;
    --bg-color: #f8fafc;
    --card-bg: #ffffff;
    --text-main: #334155;
    --text-muted: #64748b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Cairo', sans-serif;
    background-color: var(--bg-color);
  }

  /* ═══ HERO HEADER ═══ */
  .site-hero {
    background: var(--primary-dark);
    padding: 44px 20px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .site-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 15% 20%, rgba(234,179,8,0.12) 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(234,179,8,0.08) 0%, transparent 45%);
  }
  .site-hero-inner {
    position: relative;
    z-index: 1;
    opacity: 0;
    animation: heroIn 0.9s ease-out forwards;
  }
  @keyframes heroIn {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .site-logo {
    width: 64px; height: 64px;
    background: var(--accent-yellow);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    font-size: 30px;
    color: var(--primary-dark);
    box-shadow: 0 10px 25px rgba(234,179,8,0.35);
  }
  .site-title {
    color: #ffffff;
    font-size: 28px;
    font-weight: 900;
    margin: 0 0 6px;
  }
  .site-subtitle {
    color: #cbd5e1;
    font-size: 14px;
    font-weight: 600;
    margin: 0;
  }

  /* ═══ NAV ═══ */
  .menu-toggle {
    position: fixed;
    top: 16px; left: 16px;
    width: 40px; height: 40px;
    background: var(--accent-yellow);
    border: none;
    border-radius: 11px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    z-index: 300;
    box-shadow: 0 6px 14px rgba(234,179,8,0.35);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.4s ease;
    animation: menuPulse 2.2s ease-in-out 1.2s 2;
  }
  .menu-toggle:hover { transform: scale(1.08); }
  .menu-toggle span {
    width: 16px; height: 2px;
    background: var(--primary-dark);
    border-radius: 2px;
    transition: transform 0.4s cubic-bezier(0.65,0,0.35,1), opacity 0.3s ease;
  }
  .menu-toggle.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
  .menu-toggle.open span:nth-child(2) { opacity: 0; }
  .menu-toggle.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
  @keyframes menuPulse {
    0%, 100% { box-shadow: 0 8px 20px rgba(234,179,8,0.35); }
    50% { box-shadow: 0 8px 26px rgba(234,179,8,0.65), 0 0 0 8px rgba(234,179,8,0.12); }
  }

  .menu-overlay {
    position: fixed; inset: 0;
    background: rgba(15,23,42,0.4);
    backdrop-filter: blur(2px);
    opacity: 0; visibility: hidden;
    transition: opacity 0.4s ease, visibility 0.4s ease;
    z-index: 250;
  }
  .menu-overlay.open { opacity: 1; visibility: visible; }

  .menu-panel {
    position: fixed;
    top: 64px; left: 16px;
    width: 220px;
    background: var(--card-bg);
    border-radius: 16px;
    box-shadow: 0 25px 50px rgba(15,23,42,0.25);
    padding: 8px;
    z-index: 280;
    transform-origin: top left;
    transform: scale(0.85) translateY(-14px);
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.35s ease, visibility 0.4s;
  }
  .menu-panel.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }
  .menu-panel-title {
    font-size: 10px;
    font-weight: 800;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 10px 8px;
  }
  .menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: transparent;
    border: none;
    padding: 10px 10px;
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-main);
    cursor: pointer;
    text-align: right;
    transition: background-color 0.3s ease, color 0.3s ease, transform 0.3s ease;
    opacity: 0;
    transform: translateX(-10px);
  }
  .menu-panel.open .menu-item {
    animation: itemIn 0.4s ease forwards;
  }
  .menu-panel.open .menu-item:nth-child(2) { animation-delay: 0.05s; }
  .menu-panel.open .menu-item:nth-child(3) { animation-delay: 0.1s; }
  .menu-panel.open .menu-item:nth-child(4) { animation-delay: 0.15s; }
  .menu-panel.open .menu-item:nth-child(5) { animation-delay: 0.2s; }
  .menu-panel.open .menu-item:nth-child(6) { animation-delay: 0.25s; }
  @keyframes itemIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .menu-item i { width: 18px; text-align: center; color: var(--text-muted); transition: color 0.3s ease; }
  .menu-item:hover { background: #f1f5f9; }
  .menu-item.active { background: var(--primary-dark); color: #fff; }
  .menu-item.active i { color: var(--accent-yellow); }

  .lang-toggle {
    position: fixed;
    top: 16px; right: 16px;
    z-index: 300;
    display: flex;
    background: rgba(255,255,255,0.95);
    border-radius: 24px;
    padding: 3px;
    gap: 2px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    position: fixed;
  }
  .lang-toggle { position: fixed; }
  .lang-option {
    position: relative;
    z-index: 2;
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 800;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 18px;
    transition: color 0.35s ease;
    font-family: 'Cairo', sans-serif;
  }
  .lang-option.active { color: var(--primary-dark); }
  .lang-slider {
    position: absolute;
    top: 3px; right: 3px;
    width: 36px; height: calc(100% - 6px);
    background: var(--accent-yellow);
    border-radius: 18px;
    transition: transform 0.4s cubic-bezier(0.65,0,0.35,1);
    z-index: 1;
  }
  .lang-toggle[data-lang="en"] .lang-slider { transform: translateX(-38px); }

  /* ═══ CURRENT SECTION INDICATOR ═══ */
  .current-indicator {
    max-width: 1100px;
    margin: 18px auto 6px;
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 700;
  }
  .current-indicator i { color: var(--accent-yellow); }
  .current-indicator span {
    color: var(--primary-dark);
    animation: fadeSwap 0.4s ease;
  }
  @keyframes fadeSwap {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ═══ SECTIONS ═══ */
  .section-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0;
    min-height: 300px;
  }
  .section {
    display: none;
  }
  .section.active {
    display: block;
    animation: sectionIn 0.55s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes sectionIn {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .section iframe {
    width: 100%;
    border: none;
    display: block;
    background: transparent;
  }

  .section-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 80px 20px;
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 600;
  }
  .spinner {
    width: 22px; height: 22px;
    border: 3px solid #e2e8f0;
    border-top-color: var(--accent-yellow);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ═══ FOOTER ═══ */
  .footer-container {
    background-color: var(--primary-dark);
    color: #ffffff;
    padding: 24px 20px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-top: 20px;
  }
  .footer-title {
    color: var(--accent-yellow);
    font-size: 18px;
    font-weight: 700;
  }
  .footer-subtitle {
    color: #ffffff;
    font-size: 12px;
    opacity: 0.9;
  }
  .footer-link-item {
    color: #ffffff;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    transition: color 0.3s ease;
  }
  .footer-link-item:hover { color: var(--accent-yellow); }
  .footer-divider {
    border: 0;
    border-top: 1px solid rgba(255,255,255,0.15);
    width: 80%;
    margin: 4px 0;
  }
  .footer-copy {
    color: #ffffff;
    font-size: 11px;
    opacity: 0.7;
  }

  /* ═══ 480px ═══ */
  @media (max-width: 480px) {
    .site-hero { padding: 30px 16px 26px; }
    .site-logo { width: 52px; height: 52px; font-size: 24px; border-radius: 13px; }
    .site-title { font-size: 20px; }
    .site-subtitle { font-size: 12px; }
    .menu-toggle { width: 36px; height: 36px; top: 12px; left: 12px; border-radius: 10px; }
    .menu-panel { top: 56px; left: 12px; width: calc(100% - 24px); max-width: 220px; }
    .lang-toggle { top: 12px; right: 12px; }
    .lang-option { padding: 5px 10px; font-size: 10px; }
    .lang-slider { width: 32px; }
    .lang-toggle[data-lang="en"] .lang-slider { transform: translateX(-34px); }
    .current-indicator { font-size: 12px; margin: 14px auto 4px; }
    .footer-container { padding: 18px 14px; gap: 6px; }
    .footer-title { font-size: 15px; }
  }

  /* ═══ 768px ═══ */
  @media (min-width: 481px) and (max-width: 768px) {
    .site-hero { padding: 36px 18px 30px; }
    .site-title { font-size: 24px; }
  }
</style>
</head>

function b64ToUtf8(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

const sections = [
  { key: 'home',     iframeId: 'iframe-home',     b64: PAYLOAD_HOME },
  { key: 'tools',     iframeId: 'iframe-tools',     b64: PAYLOAD_TOOLS },
  { key: 'books',     iframeId: 'iframe-books',     b64: PAYLOAD_BOOKS },
  { key: 'glossary',  iframeId: 'iframe-glossary',  b64: PAYLOAD_GLOSSARY },
  { key: 'about',     iframeId: 'iframe-about',     b64: PAYLOAD_ABOUT }
];

function autoSizeIframe(iframe) {
  try {
    const doc = iframe.contentDocument;
    if (!doc) return;
    function resize() {
      const h = Math.max(
        doc.documentElement ? doc.documentElement.scrollHeight : 0,
        doc.body ? doc.body.scrollHeight : 0
      );
      if (h > 0) iframe.style.height = h + 'px';
    }
    resize();
    setTimeout(resize, 200);
    setTimeout(resize, 700);
    if (window.ResizeObserver && doc.body) {
      const ro = new ResizeObserver(resize);
      ro.observe(doc.body);
    }
    doc.addEventListener('click', function () { setTimeout(resize, 150); setTimeout(resize, 400); });
    doc.addEventListener('input', function () { setTimeout(resize, 150); });
  } catch (e) { /* silent */ }
}

sections.forEach(function (s) {
  const iframe = document.getElementById(s.iframeId);
  const loadingEl = document.querySelector('#sec-' + s.key + ' [data-loading]');
  iframe.addEventListener('load', function () {
    autoSizeIframe(iframe);
    if (loadingEl) loadingEl.style.display = 'none';
    iframe.style.opacity = '1';
  });
  iframe.style.opacity = '0';
  iframe.style.transition = 'opacity 0.4s ease';
  iframe.srcdoc = b64ToUtf8(s.b64);
});

/* ---- menu open/close ---- */
const menuToggle = document.getElementById('menuToggle');
const menuPanel = document.getElementById('menuPanel');
const menuOverlay = document.getElementById('menuOverlay');

function openMenu() {
  menuToggle.classList.add('open');
  menuPanel.classList.add('open');
  menuOverlay.classList.add('open');
}
function closeMenu() {
  menuToggle.classList.remove('open');
  menuPanel.classList.remove('open');
  menuOverlay.classList.remove('open');
}
menuToggle.addEventListener('click', function () {
  if (menuPanel.classList.contains('open')) closeMenu(); else openMenu();
});
menuOverlay.addEventListener('click', closeMenu);
document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeMenu(); });

/* ---- section switching ---- */
const menuItems = document.querySelectorAll('.menu-item');
const allSections = document.querySelectorAll('.section');
const currentSectionLabel = document.getElementById('currentSectionLabel');

menuItems.forEach(function (item) {
  item.addEventListener('click', function () {
    menuItems.forEach(function (t) { t.classList.remove('active'); });
    item.classList.add('active');
    const target = item.getAttribute('data-section');

    allSections.forEach(function (sec) {
      if (sec.id === 'sec-' + target) {
        sec.classList.add('active');
        const ifr = sec.querySelector('iframe');
        if (ifr) setTimeout(function(){ autoSizeIframe(ifr); }, 50);
      } else {
        sec.classList.remove('active');
      }
    });

    const labelSpan = item.querySelector('span');
    currentSectionLabel.setAttribute('data-ar', labelSpan.getAttribute('data-ar'));
    currentSectionLabel.setAttribute('data-en', labelSpan.getAttribute('data-en'));
    currentSectionLabel.textContent = labelSpan.getAttribute('data-' + currentLang);
    currentSectionLabel.style.animation = 'none';
    void currentSectionLabel.offsetWidth;
    currentSectionLabel.style.animation = 'fadeSwap 0.4s ease';

    closeMenu();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

/* ---- language toggle ---- */
let currentLang = 'ar';
const langToggle = document.getElementById('langToggle');
const langOptions = document.querySelectorAll('.lang-option');

function applyLang(lang) {
  currentLang = lang;
  langToggle.setAttribute('data-lang', lang);
  langOptions.forEach(function (opt) {
    opt.classList.toggle('active', opt.getAttribute('data-lang') === lang);
  });
  document.querySelectorAll('[data-ar][data-en]').forEach(function (el) {
    el.textContent = el.getAttribute('data-' + lang);
  });
  document.documentElement.setAttribute('lang', lang);
}

langOptions.forEach(function (opt) {
  opt.addEventListener('click', function () {
    applyLang(opt.getAttribute('data-lang'));
  });
});
</script>
